<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>登記所備付地図ビューア — 案件管理システム</title>
<link rel="stylesheet" href="libs/leaflet/dist/leaflet.css">
<link rel="stylesheet" href="topbar.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
    font-size: 14px;
    color: #1a2c3a;
    background: #f4f8fb;
    overflow: hidden;
  }

  .app { display: flex; flex-direction: column; height: 100vh; }

  .viewer-body { flex: 1; min-height: 0; display: flex; }

  /* ---------- 左: 地図 ---------- */
  .pane-map { flex: 1; min-width: 0; position: relative; background: #eef2f7; }
  #map { position: absolute; inset: 0; }

  /* 地番ラベル（ポリゴン中心の常時ツールチップ） */
  .map-label {
    background: transparent !important;
    border: 0 !important;
    box-shadow: none !important;
    pointer-events: none;
    white-space: nowrap;
  }
  .label-chiban {
    font-weight: 700; font-size: 10px;
    text-shadow: 0 0 2px #fff, 0 0 2px #fff, 0 0 2px #fff, 0 0 2px #fff;
  }

  /* ---------- 右: サイドパネル ---------- */
  .sidebar {
    flex: none; width: 340px;
    background: #fff; border-left: 1px solid #d4dde6;
    display: flex; flex-direction: column;
    overflow-y: auto;
  }
  .sidebar section { padding: 14px 16px; border-bottom: 1px solid #eef2f7; }
  .sidebar h2 {
    font-size: 11px; color: #64748b; font-weight: 600;
    text-transform: uppercase; letter-spacing: .04em;
    margin-bottom: 10px;
  }

  /* 図面レイヤー一覧 */
  .sheet-row {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 8px; margin: 0 -8px;
    border-radius: 6px; cursor: pointer;
  }
  .sheet-row:hover { background: #f1f5f9; }
  .sheet-row input[type="checkbox"] { flex: none; cursor: pointer; }
  .sheet-row .swatch {
    flex: none; width: 14px; height: 14px; border-radius: 3px;
    border: 2px solid currentColor; opacity: .9;
  }
  .sheet-row .sheet-name { flex: 1; min-width: 0; }
  .sheet-row .sheet-name .nm { font-size: 13px; font-weight: 600; color: #1e293b; }
  .sheet-row .sheet-name .sub {
    font-size: 10px; color: #94a3b8;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sheet-row .count {
    flex: none; font-size: 11px; color: #475569;
    background: #f1f5f9; border-radius: 8px; padding: 2px 8px;
  }

  /* 筆の詳細 */
  .parcel-empty { color: #94a3b8; font-size: 12px; padding: 6px 0 2px; }
  .parcel-meta { display: grid; grid-template-columns: 88px 1fr; gap: 6px 10px; }
  .parcel-meta .label { color: #64748b; font-size: 11px; padding-top: 1px; }
  .parcel-meta .value { color: #1e293b; font-size: 12px; line-height: 1.5; word-break: break-all; }
  .parcel-meta .value.big { font-size: 16px; font-weight: 700; color: #21295c; }

  /* 出典ノート */
  .source-note { font-size: 10px; color: #94a3b8; line-height: 1.6; }
  .source-note b { color: #64748b; }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <h1><a href="index.html" class="sys-name">案件管理システム</a> — 登記所備付地図ビューア <span class="badge">DEMO</span></h1>
  </div>

  <div class="viewer-body">
    <div class="pane-map">
      <div id="map"></div>
    </div>

    <div class="sidebar">
      <section>
        <h2>図面レイヤー（公共座標系のみ）</h2>
        <div id="sheet-list"></div>
      </section>

      <section>
        <h2>筆の詳細</h2>
        <div id="parcel-detail">
          <div class="parcel-empty">地図上の筆ポリゴンをクリックすると詳細を表示します。</div>
        </div>
      </section>

      <section>
        <div class="source-note">
          <b>出典:</b> 登記所備付地図データ（法務省）— G空間情報センターから取得した
          台東区（13106）2026年版のうち、座標系が「公共座標9系」の4図面のみを表示。
          平面直角座標系第IX系（JGD2011）から緯度経度に変換済み。<br>
          任意座標系の図面（140図面）は絶対位置を持たないため本ビューには表示できない。
        </div>
      </section>
    </div>
  </div>
</div>

<script src="libs/leaflet/dist/leaflet.js"></script>
<script src="kouzu_xml_data.js"></script>
<script src="kouzu-map.js"></script>
</body>
</html>
